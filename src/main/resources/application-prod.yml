# 生产环境：启动时 --spring.profiles.active=prod
# 数据源必须通过环境变量提供，勿在仓库中写明文密码。

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: WARN
    com.sfc.flowtest: INFO

server:
  error:
    whitelabel:
      enabled: false

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health
