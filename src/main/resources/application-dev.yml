# 开发环境（默认激活）

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/sfc_flow_test?useUnicode=true&characterEncoding=utf8&connectionTimeZone=Asia/Shanghai&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: INFO
    com.sfc.flowtest: DEBUG

management:
  endpoint:
    health:
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health
